<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code 是什么</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 800px; min-height: 800px;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  color: #fff;
  padding: 40px;
}
.container { width: 100%; max-width: 680px; }
.section-title {
  font-size: 36px; font-weight: 900; text-align: center;
  margin-bottom: 12px;
  background: linear-gradient(135deg, #a8edea, #fed6e3);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.sub-desc {
  text-align: center; font-size: 17px; color: #aaa; margin-bottom: 32px;
}
.card-row {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 14px; margin-bottom: 28px;
}
.card-item {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px; padding: 20px 22px;
}
.card-item .icon { font-size: 32px; margin-bottom: 8px; display: block; }
.card-item .label { font-size: 19px; font-weight: 700; margin-bottom: 4px; }
.card-item .desc { font-size: 14px; color: #999; line-height: 1.5; }
.analogy {
  background: linear-gradient(135deg, rgba(168,237,234,0.12), rgba(254,214,227,0.12));
  border: 1px solid rgba(168,237,234,0.25);
  border-radius: 18px; padding: 24px 30px;
  text-align: center; font-size: 18px; line-height: 1.8;
}
.analogy .big { font-size: 24px; display: block; margin-bottom: 8px; }
.analogy strong { color: #a8edea; }
</style>
</head>
<body>
<div class="container">
  <div class="section-title">🤖 Claude Code 是什么？</div>
  <div class="sub-desc">一个直接在电脑终端运行的 AI 编程助手</div>

  <div class="card-row">
    <div class="card-item">
      <span class="icon">✍️</span>
      <div class="label">写代码</div>
      <div class="desc">Python、JS、网页、小程序…一句话搞定</div>
    </div>
    <div class="card-item">
      <span class="icon">🔧</span>
      <div class="label">改代码</div>
      <div class="desc">重构、优化、修Bug，直接操作你的文件</div>
    </div>
    <div class="card-item">
      <span class="icon">🏗️</span>
      <div class="label">建项目</div>
      <div class="desc">从零搭建完整前端/后端项目</div>
    </div>
    <div class="card-item">
      <span class="icon">📖</span>
      <div class="label">解释代码</div>
      <div class="desc">看不懂的代码丢给它，秒懂</div>
    </div>
    <div class="card-item">
      <span class="icon">🐛</span>
      <div class="label">修Bug</div>
      <div class="desc">报错信息贴给它，自动定位修复</div>
    </div>
    <div class="card-item">
      <span class="icon">📂</span>
      <div class="label">操作文件</div>
      <div class="desc">批量重命名、格式转换、查找替换</div>
    </div>
  </div>

  <div class="analogy">
    <span class="big">💡</span>
    简单理解：<strong>一个能直接操作你电脑文件的 ChatGPT</strong><br>
    而且<strong>超级懂编程</strong>，比通用 AI 强太多了
  </div>
</div>
</body>
</html>
