<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>封面主图</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 800px; height: 800px;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #0f0c29 0%, #302b63 40%, #24243e 100%);
  font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  color: #fff;
  overflow: hidden;
}
.card {
  text-align: center;
  position: relative;
}
.badge {
  display: inline-block;
  background: linear-gradient(135deg, #f093fb, #f5576c);
  color: #fff;
  padding: 8px 24px;
  border-radius: 20px;
  font-size: 18px;
  font-weight: bold;
  letter-spacing: 2px;
  margin-bottom: 24px;
}
.title {
  font-size: 72px;
  font-weight: 900;
  background: linear-gradient(135deg, #a8edea, #fed6e3, #d4fc79);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.2;
  margin-bottom: 8px;
}
.subtitle {
  font-size: 36px;
  font-weight: 600;
  color: #e0e0e0;
  margin-bottom: 32px;
  letter-spacing: 4px;
}
.features {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 40px;
}
.feature {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px;
  padding: 16px 28px;
  font-size: 20px;
  color: #ddd;
  white-space: nowrap;
}
.feature .icon { font-size: 28px; display: block; margin-bottom: 6px; }
.highlight {
  display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
  margin-bottom: 32px;
}
.tag {
  background: rgba(168,237,234,0.2);
  border: 1px solid rgba(168,237,234,0.4);
  border-radius: 24px;
  padding: 10px 24px;
  font-size: 18px;
  color: #a8edea;
}
.price-hint {
  margin-top: 48px;
  font-size: 22px;
  color: rgba(255,255,255,0.6);
  letter-spacing: 2px;
}
.price-hint span {
  color: #f5576c;
  font-size: 32px;
  font-weight: bold;
}
</style>
</head>
<body>
<div class="card">
  <div class="badge">🔥 AI 编程新时代</div>
  <div class="title">Claude Code</div>
  <div class="subtitle">一键安装服务</div>

  <div class="features">
    <div class="feature">
      <span class="icon">✍️</span> 写代码
    </div>
    <div class="feature">
      <span class="icon">🔧</span> 修Bug
    </div>
    <div class="feature">
      <span class="icon">🏗️</span> 建项目
    </div>
    <div class="feature">
      <span class="icon">📖</span> 解释代码
    </div>
  </div>

  <div class="highlight">
    <div class="tag">✅ 无需技术基础</div>
    <div class="tag">⚡ 远程10分钟搞定</div>
    <div class="tag">🇨🇳 支持DeepSeek</div>
  </div>

  <div class="price-hint">远程安装仅需 <span>¥19.9</span> 起</div>
</div>
</body>
</html>
